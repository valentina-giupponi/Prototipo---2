<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Scansione disegno</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="scan.css">
  </head>
  <body class="scan-body">

    <!-- ── CAPTURE VIEW ───────────────────────────────── -->
    <section id="captureView" class="scan-view" aria-label="Scansione disegno">

      <!-- Camera full-screen -->
      <video id="camera" class="scan-video" autoplay playsinline muted></video>
      <canvas id="snapshot" hidden></canvas>

      <!-- A4 guide overlay (crop target + dark vignette outside) -->
      <div id="a4Guide" class="scan-a4-guide" aria-hidden="true"></div>

      <!-- Hint (hidden after camera starts) -->
      <div id="cameraMessage" class="scan-hint">
        Inquadra il foglio nel rettangolo
      </div>

      <!-- Back button -->
      <a href="home.html" class="scan-back" aria-label="Torna indietro">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M13 4 L7 10 L13 16" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>

      <!-- Bottom controls -->
      <div class="scan-bottom">
        <!-- Upload from gallery (secondary) -->
        <label class="scan-gallery-btn" for="fileInput" aria-label="Carica dal rullino">
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
            <rect x="2" y="7" width="18" height="13" rx="2.5" stroke="currentColor" stroke-width="2"/>
            <path d="M6 7V5a2 2 0 012-2h6a2 2 0 012 2v2" stroke="currentColor" stroke-width="2"/>
          </svg>
        </label>
        <input id="fileInput" type="file" accept="image/*" hidden>

        <!-- Main shutter button -->
        <button id="takePhoto" class="scan-shutter" aria-label="Scatta" disabled>
          <span class="shutter-ring" aria-hidden="true"></span>
        </button>

        <!-- Spacer for symmetry -->
        <div class="scan-spacer" aria-hidden="true"></div>
      </div>

      <!-- Hidden utility elements (used by capture.js) -->
      <button id="startCamera" aria-hidden="true" style="position:absolute;opacity:0;pointer-events:none;width:0;height:0"></button>
      <input id="scanMode" type="checkbox" checked aria-hidden="true" style="position:absolute;opacity:0;pointer-events:none;width:0;height:0">
      <p id="status" class="scan-status" role="status"></p>
    </section>

    <!-- ── LOADING VIEW ───────────────────────────────── -->
    <section id="loadingView" class="scan-overlay scan-loading" aria-label="Analisi disegno" hidden>
      <a href="home.html" class="scan-back" aria-label="Torna indietro">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M13 4 L7 10 L13 16" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>
      <img src="assets/character/Character_Analisi.png" alt="" class="loading-character">
      <h1 class="loading-title">Ancora un attimo!</h1>
      <p class="loading-subtitle">Stiamo elaborando il tuo disegno</p>
    </section>

    <!-- ── CONFIRM VIEW ───────────────────────────────── -->
    <section id="confirmView" class="scan-overlay scan-confirm" aria-label="Conferma scansione" hidden>
      <img src="assets/character/linea_2.png" class="confirm-swirl" alt="" aria-hidden="true">

      <h1 class="confirm-title">è TuTTo<br>(QuaSI) PRonTo!</h1>

      <div class="confirm-preview">
        <img id="confirmPreview" alt="Disegno scansionato">
      </div>

      <p class="confirm-question">Sei soddisfatto<br>del risultato?</p>

      <div class="confirm-actions">
        <button id="retakeScan" class="confirm-btn confirm-btn-no" type="button" aria-label="Rifai la scansione">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M6 6 L18 18 M18 6 L6 18" stroke="#fff" stroke-width="2.8" stroke-linecap="round"/>
          </svg>
        </button>
        <button id="confirmScan" class="confirm-btn confirm-btn-yes" type="button" aria-label="Conferma il disegno">
          <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
            <path d="M5 13 L11 19 L21 7" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>

      <p id="confirmStatus" class="confirm-status" role="status"></p>
    </section>

    <!-- ── WALL NOTICE VIEW ───────────────────────────── -->
    <section id="wallNoticeView" class="scan-overlay scan-wall" aria-label="Messaggio parete" hidden>
      <h1 class="wall-title">OCChI<br>aI QUaDRI!</h1>
      <p class="wall-subtitle">La tua cosa da niente<br>sta prendendo vita</p>
      <img src="assets/character/Character_parete_2.png" class="wall-character" alt="" aria-hidden="true">
      <a href="home.html" class="wall-continue">Continua</a>
    </section>

    <script src="capture.js"></script>
    <script>
      // Auto-start camera on page load
      window.addEventListener("load", () => { startCamera(); });
    </script>
  </body>
</html>
