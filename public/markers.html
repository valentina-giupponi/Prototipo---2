<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Marker cornici</title>
    <link rel="stylesheet" href="styles.css">
    <style>
      .marker-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; padding: 2rem; }
      .marker-card { text-align: center; }
      .marker-code { display: inline-grid; grid-template-columns: repeat(6, 1fr); gap: 2px; background: white; padding: 8px; }
      .marker-code span { width: 30px; height: 30px; background: white; border: 1px solid #ddd; }
      .marker-code span.is-dark { background: black; }
    </style>
  </head>
  <body class="capture-page">
    <main class="marker-page">
      <div class="topbar">
        <div>
          <p class="eyebrow">Marker univoci e corretti</p>
          <h1>Codici cornice</h1>
        </div>
        <a class="screen-link" href="frame.html">Scansiona cornice</a>
      </div>
      <section id="markerGrid" class="marker-grid" aria-label="Marker delle cornici"></section>
    </main>

    <script>
      // Definizione esplicita e univoca dei 6 marker ArUco
      // Ogni marker è una griglia 6x6 con bit espliciti per garantire univocità
      const markers = [
        { id: "001", bits: "0000000000000001" },  // 1
        { id: "002", bits: "0000000000000010" },  // 2
        { id: "003", bits: "0000000000000011" },  // 3
        { id: "004", bits: "0000000000000100" },  // 4
        { id: "005", bits: "0000000000000101" },  // 5
        { id: "006", bits: "0000000000000110" },  // 6
      ];

      const markerGrid = document.querySelector("#markerGrid");

      for (const marker of markers) {
        const card = document.createElement("article");
        card.className = "marker-card";

        const title = document.createElement("h2");
        title.textContent = `Cornice ${marker.id}`;

        const markerDiv = document.createElement("div");
        markerDiv.className = "marker-code";
        markerDiv.setAttribute("aria-label", `Marker Cornice ${marker.id}`);

        const bits = marker.bits.split("").map(Number);
        let bitIndex = 0;

        for (let row = 0; row < 6; row += 1) {
          for (let col = 0; col < 6; col += 1) {
            const cell = document.createElement("span");
            const isBorder = row === 0 || col === 0 || row === 5 || col === 5;
            const bitValue = isBorder ? 1 : bits[bitIndex++];
            const isDark = bitValue === 1;
            cell.className = isDark ? "is-dark" : "";
            markerDiv.append(cell);
          }
        }

        card.append(title, markerDiv);
        markerGrid.append(card);
      }
    </script>
  </body>
</html>
